# texcount.cfg — what counts toward word total.
#
# Excludes \todo, \needcite, \gap markers and the working-notes box
# environments. Includes section/subsection headings.

%TC:macro \todo [option]
%TC:macro \needcite [option]
%TC:macro \gap [option]
%TC:envir notesbox 0 0
%TC:envir insightnotesbox 0 0
%TC:envir gapbox 0 0
